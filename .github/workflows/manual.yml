name: Manual workflow test

on:
  workflow_dispatch:
    inputs:
      Buildenv:
        description: "Select the build environment eg: dev, staging, prod"
        required: true
        type: string
      Tags:
        description: "Enter a valid tag to run test cases"
        required: true
        type: string
      Runcleanupspecs:
        type: choice
        required: true
        options:
          - "true"
          - "false"
  schedule:
    - cron: '0 5 * * *' # Schedule to run at 5:00 AM every day
jobs:
  Workflow_test:
    runs-on: ubuntu-latest
    if: ${{ inputs.Tags == '@smoke' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: npm install

      - name: Current git workflow env
        run: echo ${{ inputs.Buildenv }}

      - name: TAGS WORKING IN
        run: |
          Tag="${{ inputs.Tags }}"
          echo "Received tag: $Tag"

      - name: ENV WORKING IN
        run: |
          Env="${{ inputs.Buildenv }}"
          echo "$Env"

      - name: Cleanup spec option received
        run: |
          Cleanup="${{ inputs.Runcleanupspecs }}"
          echo "$Cleanup"

      - name: Create artifact file
        run: |
          echo "Test output from ${{ inputs.Buildenv }}" > test-output.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: my-artifact
          path: test-output.txt

  JOBE_2:
    runs-on: ubuntu-latest
    if: ${{ inputs.Buildenv != 'Prod' }}
    needs: Workflow_test
    strategy:
      matrix:
        environment: [QA, Dev]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Current ENV and tags
        run: |
          Env="${{ matrix.environment }}"
          TAGS="${{ inputs.Tags }}"
          echo "ENV: $Env"
          echo "TAGS: $TAGS"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: my-artifact

  JOBE_3:
    runs-on: ubuntu-latest
    needs: JOBE_2
    if: ${{ always() && (needs.JOBE_2.result == 'success' || needs.JOBE_2.result == 'skipped' || needs.JOBE_2.result == 'failure') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright IPL points table test
        run: npx playwright test playwright/tests/youtube/search.spec.js --project=chromium

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
  JOBE_4:
    runs-on: ubuntu-latest
    needs: JOBE_3
    if: ${{ always() && (needs.JOBE_3.result == 'success' || needs.JOBE_3.result == 'skipped' || needs.JOBE_3.result == 'failure') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: npm install || (rm -rf node_modules && npm install)

      - name: Install dependencies
        run: npm install

      - name: Run Cypress Assertion specs
        run: |
          npx cypress run --spec 'cypress/e2e/youtube/search.cy.js' --browser chromium
    
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

name: Manual workflow test

on:
  workflow_dispatch:
    inputs:
      Buildenv:
        description: "Select the build environment eg: dev, staging, prod"
        required: true
        type: string
      Tags:
        description: "Enter a valid tag to run test cases"
        required: true
        type: string
      Runcleanupspecs:
        type: choice
        required: true
        options:
          - "true"
          - "false"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  Worflow_test:
    runs-on: ubuntu-latest
    if: ${{ inputs.Tags == '@smoke' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: npm install || (rm -rf node_modules && npm install)
  
      
      - name: Current git workflow env
        run: echo ${{ inputs.Buildenv }}

      - name: TAGS WORKING IN
        run: |
          Tag="${{ inputs.Tags }}"
          echo "Received tag: $Tag"
 
      - name: ENV WORKING IN
        run: |
          Env="${{ inputs.Buildenv }}"
          echo "$Env"

      - name: Cleanup spec option received
        run: |
          Cleanup="${{ inputs.Runcleanupspecs }}"
          echo "$Cleanup"

      - name: aritifacts
        uses: actions/upload-artifact@v4
        with:
          name: my-artifact
          path: test-output.txt


  JOBE_2:
    runs-on: ubuntu-latest
    if: ${{ inputs.Buildenv != 'Prod' }}
    needs: Worflow_test
    strategy:
      matrix:
        environment: [Prod, QA]   # ✅ fixed indentation
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Current ENV and tags
        run: |
          Env="${{ matrix.environment }}"   # ✅ use matrix value here
          TAGS="${{ inputs.Tags }}"
          echo "ENV: $Env"
          echo "TAGS: $TAGS"
      - name: download artifacts
        uses: actions/download-artifact@v4
        with:
          name: my-artifact

  JOBE_3:
    runs-on: ubuntu-latest
    needs: JOBE_2
    if: ${{ always() }}
    steps:
      - name: Current ENV and tags
        run: |
          Env="${{ inputs.Buildenv }}"
          echo "Environment: $Env"
name: Manual workflow test
#name of the workflow
on:
  workflow_dispatch:
    inputs:
     Buildenv:
       description: "Select the build environment eg: dev, staging, prod"
       required: true
       type: string  # this inputs are showed at the time of #triggering a new workflow manually
     Tags:
      description: "Enter a valid tag to run test cases"
      required: true
      type: string
jobs:
  Worflow_test:
    runs-on: ubuntu-latest
    steps:
      - name: Current git worflow env
        run: echo ${{inputs.Buildenv}} #this print the value of the input
        # provided at the time of triggering the workflow

      - name: Tags received for test
        run: |
         Tag ="${{inputs.Tags}}" 
         echo "Received tag: $Tag"

      - name: YML instructions working 
        run: |
         Env="${{inputs.Buildenv}}"
         echo "$Env" 
        
        
        
  # this is an example of using the yml instructions to convert the input value to lowercase
        
